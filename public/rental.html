<section class="rental-page">

<div class="rental-box">

<h1>Reserve Your Luxury Dress</h1>

<form id="rentalForm">

<label>Choose Dress</label>

<select id="dress">

<option value="Luxury Wedding Dress">Luxury Wedding Dress</option>

<option value="Traditional Habesha">Traditional Habesha</option>

<option value="Modern Collection">Modern Collection</option>

<option value="Royal Bridal Dress">Royal Bridal Dress</option>

<option value="Graduation Dress">Graduation Dress</option>

<option value="Golden Collection">Golden Collection</option>

</select>

<label>Delivery Address</label>

<input
type="text"
id="address"
placeholder="Enter your address"
required>

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="+251..."
required>

<label>Rental Start Date</label>

<input
type="date"
id="startDate"
required>

<label>Return Date</label>

<input
type="date"
id="returnDate"
readonly>

<div class="summary">

<h3>Rental Summary</h3>

<p>Rental Days:
<span id="days">5</span></p>

<p>Total Price:
<strong>$<span id="price">0</span></strong></p>

</div>

<button type="submit">

Confirm Rental

</button>

</form>

</div>

</section>
